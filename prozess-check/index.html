<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Kostenloser Prozess-Check — PRONECTO</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

#screen-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 100px 20px 60px;
}
.screen { width: 100%; max-width: 680px; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(250,250,250,0.94); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
#back-btn {
  background: none; border: none; cursor: pointer; color: var(--text-sec);
  font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
  font-family: 'Outfit', sans-serif; padding: 6px 0; transition: color 0.2s;
}
#back-btn:hover { color: var(--navy); }
#block-indicator { font-size: 0.78rem; color: var(--text-sec); font-weight: 500; }

.progress-bar-wrap { top: 55px; }

/* Intro */
.intro-hero { text-align: center; padding: 0 0 20px; }
.intro-logo { display:flex; justify-content:center; margin-bottom:28px; }
.intro-hero h1 { margin-bottom: 16px; }
.intro-hero h1 em { font-family: 'Source Serif 4', serif; font-style:italic; }
.intro-hero p { font-size: 1.05rem; color: var(--text); max-width: 480px; margin: 0 auto 28px; }
.intro-meta { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; flex-wrap: wrap; }
.intro-meta span { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-sec); }

/* Questions */
.q-block-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: #FFF5EF; color: var(--orange);
  font-size: 0.73rem; font-weight: 600; padding: 5px 12px;
  border-radius: 20px; margin-bottom: 16px;
}
.q-title { font-size: clamp(1.15rem,2.8vw,1.55rem); font-weight: 700; margin-bottom: 8px; line-height: 1.35; }
.q-hinweis { background:#F5F5F5; border-radius:var(--r-sm); padding:10px 14px; font-size:0.8rem; color:var(--text-sec); margin-bottom:18px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  padding: 15px 18px; border: 1.5px solid var(--border); border-radius: var(--r-card);
  background: var(--white); text-align: left; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 0.92rem; color: var(--navy);
  transition: all 0.15s ease; line-height: 1.4;
}
.option-btn:hover { border-color: var(--orange); background: #FFF5EF; }
.option-btn.selected { border-color: var(--orange); background: #FFF5EF; color: var(--orange); font-weight: 600; }
.option-btn.selected::before { content: '✓  '; }

.multi-hint { font-size: 0.8rem; color: var(--text-sec); margin-bottom: 12px; }
.actions { display: flex; justify-content: flex-end; margin-top: 18px; }

/* Combi */
.combi-wrap { display: flex; flex-direction: column; gap: 26px; }
.combi-part-title { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
.options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media(max-width:500px){ .options-row{ grid-template-columns:1fr; } }

/* Loading */
.loading-screen { display:flex; flex-direction:column; align-items:center; text-align:center; padding:40px 20px; gap:28px; }
#loading-msg { font-size:1rem; color:var(--text); min-height:1.5em; animation:fadeIn 0.4s ease; }

/* KI Insight */
.ki-card { background:var(--white); border:1px solid var(--border); border-radius:var(--r-card); padding:26px; margin-bottom:18px; }
.ki-card-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.ki-avatar { width:34px;height:34px;background:#FFF5EF;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.ki-label { font-size:0.78rem;color:var(--text-sec); }
.ki-text { font-size:0.93rem;color:var(--text);line-height:1.75;min-height:3em; }

.kennzahl-box { background:#FFF5EF;border-radius:var(--r-card);padding:18px;text-align:center;margin:14px 0; }
.kennzahl-wert { font-size:2.2rem;font-weight:700;color:var(--orange); }
.kennzahl-einheit { font-size:0.9rem;color:var(--text-sec);margin-left:4px; }
.kennzahl-label { font-size:0.78rem;color:var(--text-sec);margin-top:4px; }

.quickwin-box { background:#F0FFF8;border:1px solid #B8E8D0;border-radius:var(--r-sm);padding:14px 16px;margin-top:14px; }
.quickwin-title { font-size:0.72rem;font-weight:700;color:var(--green);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em; }
.quickwin-text { font-size:0.88rem;color:#1A5C3A;line-height:1.5; }

/* Preview */
.preview-headline {
  background: linear-gradient(135deg, var(--navy) 0%, #2A3550 100%);
  border-radius:var(--r-card);padding:26px;color:white;text-align:center;margin-bottom:22px;
}
.preview-headline .big-num { font-size:2.8rem;font-weight:700;color:var(--orange); }
.preview-headline .big-label { font-size:0.85rem;color:rgba(255,255,255,0.65);margin-bottom:6px; }
.preview-scores { display:flex;flex-direction:column;gap:9px;margin:18px 0; }
.preview-bar-row { display:flex;align-items:center;gap:10px; }
.preview-bar-label { font-size:0.8rem;color:var(--navy);width:210px;flex-shrink:0; }
.preview-bar-track { flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden; }
.preview-bar-fill { height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.preview-bar-val { font-size:0.78rem;font-weight:600;width:28px;text-align:right; }
.preview-teaser { font-size:0.93rem;color:var(--text);line-height:1.7;margin-bottom:24px; }

.email-gate { background:var(--white);border:1px solid var(--border);border-radius:var(--r-card);padding:26px;text-align:center; }
.email-gate h3 { font-size:1.05rem;margin-bottom:7px; }
.email-gate p { font-size:0.83rem;color:var(--text-sec);margin-bottom:18px; }
.email-form { display:flex;gap:10px; }
.email-form input { flex:1; }
.email-privacy { font-size:0.73rem;color:var(--text-sec);margin-top:8px; }
@media(max-width:500px){ .email-form{flex-direction:column;} }
</style>
</head>

  {id:'load_b5n',type:'loading',block:5,api:'nachfrage'},{id:'ki_b5n',type:'ki_nachfrage',block:5},
  {id:'load_b5i',type:'loading',block:5,api:'insight'},{id:'ki_b5i',type:'ki_insight',block:5},
  {id:'load_analyse',type:'loading',api:'analyse'},
  {id:'preview',type:'preview'},
];

// ─── STATE ───────────────────────────────────────────────────────────────────

const state={idx:0,answers:{},kiNachfragen:{},kiNachfrageAnswers:{},kiInsights:{},kiAnalyse:null,scores:null};

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const getEinstieg=()=>({
  branche:state.answers.E1?.value||'andere',
  mitarbeiter:state.answers.E2?.value||'xs',
  multiplikator:state.answers.E2?.multiplikator||1.0,
  schwerpunkte:(state.answers.E3||[]).map(o=>o.block),
  digitalPunkte:(state.answers.E4||[]).reduce((s,o)=>s+(o.punkte||0),0),
});

const getBlockAntworten=b=>Object.entries(state.answers)
  .filter(([k])=>k.startsWith(`B${b}_`))
  .flatMap(([,v])=>Array.isArray(v)?v:[v])
  .filter(Boolean);

function updateUI(){
  const s=SCREENS[state.idx];
  document.getElementById('progress-fill').style.width=Math.round(state.idx/(SCREENS.length-1)*100)+'%';
  document.getElementById('back-btn').style.visibility=state.idx>0?'visible':'hidden';
  document.getElementById('block-indicator').textContent=s.block?`Block ${s.block}/5`:'';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render(){
  const s=SCREENS[state.idx];
  updateUI();
  const html={
    intro:renderIntro,question:renderQuestion,loading:renderLoading,
    ki_nachfrage:renderKiNachfrage,ki_insight:renderKiInsight,preview:renderPreview,
  }[s.type];
  document.getElementById('screen-content').innerHTML=html?html(s):'';
  window.scrollTo({top:0,behavior:'smooth'});
  if(s.type==='loading')triggerLoading(s);
  if(s.type==='ki_insight')triggerTypewriter(s.block);
}

function renderIntro(){
  return `<div class="intro-hero">
    <div class="intro-logo">
      <svg viewBox="0 0 64 64" fill="none" width="52" height="52">
        <path d="M8 40 Q20 14 32 14 Q44 14 56 40" stroke="#E8793A" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M20 40 L20 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M32 40 L32 14" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <path d="M44 40 L44 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
        <circle cx="8" cy="40" r="3" fill="#E8793A" opacity="0.4"/>
        <circle cx="56" cy="40" r="3" fill="#E8793A"/>
      </svg>
    </div>
    <h1>Finden Sie in 5 Minuten heraus,<br><em>wo Ihr Betrieb Zeit verliert.</em></h1>
    <p>Unser KI-gestützter Prozess-Check analysiert Ihre Abläufe nach der Lean-Methodik und liefert einen konkreten Maßnahmenplan.</p>
    <div class="intro-meta">
      <span>⏱ Ca. 5 Minuten</span>
      <span>🔒 Kostenlos & unverbindlich</span>
      <span>✓ Kein Account nötig</span>
    </div>
    <button class="btn btn-primary btn-lg" onclick="nextScreen()">Kostenlose Analyse starten →</button>
  </div>`;
}

function renderQuestion(s){
  const q=FRAGEN[s.qid];
  if(!q)return '';
  if(q.type==='combi')return renderCombi(s,q);
  if(q.type==='multi')return renderMulti(s,q);
  const tag=s.block?`<div class="q-block-tag">${BLOCK_INFO[s.block].icon} Block ${s.block}/5 — ${BLOCK_INFO[s.block].titel}</div>`:'';
  const sel=state.answers[s.qid];
  const opts=q.optionen.map((o,i)=>`<button class="option-btn${sel?.label===o.label?' selected':''}" onclick="selOpt('${s.qid}',${i})">${o.label}</button>`).join('');
  const hint=q.hinweis?`<div class="q-hinweis">${q.hinweis}</div>`:'';
  return `${tag}<div class="q-title">${q.frage}</div>${hint}<div class="options">${opts}</div>`;
}

function renderMulti(s,q){
  const sel=state.answers[s.qid]||[];
  const sels=sel.map(o=>o.label);
  const opts=q.optionen.map((o,i)=>`<button class="option-btn${sels.includes(o.label)?' selected':''}" onclick="toggleMulti('${s.qid}',${i},${q.max||99})">${o.label}</button>`).join('');
  return `<div class="q-title">${q.frage}</div>
    <div class="multi-hint">${q.subtext||''}</div>
    ${q.hinweis?`<div class="q-hinweis">${q.hinweis}</div>`:''}
    <div class="options">${opts}</div>
    <div class="actions"><button class="btn btn-primary" onclick="nextScreen()" ${sel.length?'':'disabled'}>Weiter →</button></div>`;
}

function renderCombi(s,q){
  const tag=s.block?`<div class="q-block-tag">${BLOCK_INFO[s.block].icon} Block ${s.block}/5 — ${BLOCK_INFO[s.block].titel}</div>`:'';
  const parts=q.teile.map(t=>{
    const sel=state.answers[t.id];
    const row=t.optionen.length<=4;
    const opts=t.optionen.map((o,i)=>`<button class="option-btn${sel?.label===o.label?' selected':''}" onclick="selOpt('${t.id}',${i},true)">${o.label}</button>`).join('');
    return `<div><div class="combi-part-title">${t.frage}</div><div class="${row?'options-row':'options'}">${opts}</div></div>`;
  }).join('');
  const done=q.teile.every(t=>state.answers[t.id]);
  return `${tag}<div class="combi-wrap">${parts}</div>
    <div class="actions" style="margin-top:22px"><button class="btn btn-primary" onclick="nextScreen()" ${done?'':'disabled'}>Weiter →</button></div>`;
}

function renderLoading(){
  return `<div class="loading-screen"><div class="spinner"></div><p id="loading-msg">${LOADING_MSGS[0]}</p></div>`;
}

function renderKiNachfrage(s){
  const ki=state.kiNachfragen[s.block];
  if(!ki)return `<div class="loading-screen"><div class="spinner"></div><p>Lade Frage…</p></div>`;
  const sel=state.kiNachfrageAnswers[s.block];
  const opts=ki.optionen.map((o,i)=>`<button class="option-btn${sel?.label===o?' selected':''}" onclick="selKiNach(${s.block},${i})">${o}</button>`).join('');
  return `<div class="q-block-tag">${BLOCK_INFO[s.block].icon} Vertiefungsfrage — Block ${s.block}</div>
    <div class="q-title">${ki.frage}</div>
    <div class="options" style="margin-bottom:18px">${opts}</div>
    <div class="actions"><button class="btn btn-primary" onclick="nextScreen()" ${sel?'':'disabled'}>Weiter →</button></div>`;
}

function renderKiInsight(s){
  const ki=state.kiInsights[s.block];
  if(!ki)return `<div class="loading-screen"><div class="spinner"></div><p>Lade Ergebnis…</p></div>`;
  return `<div class="ki-card">
    <div class="ki-card-header">
      <div class="ki-avatar"><svg viewBox="0 0 64 64" fill="none" width="18" height="18"><path d="M8 40 Q20 14 32 14 Q44 14 56 40" stroke="#E8793A" stroke-width="3.5" stroke-linecap="round"/><circle cx="56" cy="40" r="3" fill="#E8793A"/></svg></div>
      <div><div style="font-weight:600;font-size:0.88rem">PRONECTO Analyse</div><div class="ki-label">Block ${s.block}/5 — ${BLOCK_INFO[s.block].titel}</div></div>
    </div>
    <p class="ki-text" id="ki-text-${s.block}"></p>
    ${ki.kennzahl?`<div class="kennzahl-box"><div><span class="kennzahl-wert">${ki.kennzahl.wert}</span><span class="kennzahl-einheit"> ${ki.kennzahl.einheit}</span></div><div class="kennzahl-label">${ki.kennzahl.label}</div></div>`:''}
    ${ki.quick_win?`<div class="quickwin-box"><div class="quickwin-title">✓ Quick Win — sofort umsetzbar</div><div class="quickwin-text">${ki.quick_win}</div></div>`:''}
  </div>
  <div style="text-align:center;margin-top:18px">
    <button class="btn btn-primary" onclick="nextScreen()">${s.block<5?'Weiter zu Block '+(s.block+1)+' →':'Zur Gesamtauswertung →'}</button>
  </div>`;
}

function renderPreview(){
  const s=state.scores;const ki=state.kiAnalyse;
  if(!s||!ki)return `<div class="loading-screen"><div class="spinner"></div><p>Lade Auswertung…</p></div>`;
  const bars=Object.entries(s.handlungsbedarf).sort(([,a],[,b])=>b-a).map(([b,v])=>{
    const c=v>=70?'var(--red)':v>=40?'var(--yellow)':'var(--green)';
    return `<div class="preview-bar-row">
      <div class="preview-bar-label">${BLOCK_INFO[b].icon} ${BLOCK_INFO[b].titel}</div>
      <div class="preview-bar-track"><div class="preview-bar-fill" style="width:${v}%;background:${c}"></div></div>
      <div class="preview-bar-val" style="color:${c}">${v}</div>
    </div>`;
  }).join('');
  return `<div style="text-align:center;margin-bottom:18px">
    <div class="q-block-tag" style="justify-content:center">✓ Analyse abgeschlossen</div>
    <h2>Ihre Prozess-Analyse ist fertig</h2>
  </div>
  <div class="preview-headline">
    <div class="big-label">Geschätzter Zeitverlust pro Woche</div>
    <div class="big-num">${s.zeitverlustGesamt.toFixed(1)} <span style="font-size:1.3rem;font-weight:400">h</span></div>
    <div style="font-size:0.82rem;color:rgba(255,255,255,0.6);margin-top:6px">entspricht ca. ${Math.round(s.kostenJahr).toLocaleString('de-DE')} € pro Jahr</div>
  </div>
  <div class="section-header"><h3>Handlungsbedarf nach Bereichen</h3><p style="font-size:0.8rem">Basierend auf strategischer Bedeutung, Verbesserungswürdigkeit und -fähigkeit</p></div>
  <div class="preview-scores">${bars}</div>
  <p class="preview-teaser">${ki.teaser}</p>
  <div class="email-gate">
    <h3>Ihren vollständigen Maßnahmenplan erhalten</h3>
    <p>Muda-Profil, Reifegrad-Auswertung und Top-3-Maßnahmenplan — kostenlos als PDF.</p>
    <div class="email-form">
      <input type="email" id="email-input" placeholder="ihre@email.de" />
      <button class="btn btn-primary" onclick="submitEmail()">Meinen Plan erhalten →</button>
    </div>
    <p class="email-privacy">Keine Werbung, kein Abo. Nur Ihr persönliches Ergebnis.</p>
  </div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

window.selOpt=function(qid,idx,isCombi=false){
  const q=FRAGEN[qid]||(Object.values(FRAGEN).find(f=>f.teile?.some(t=>t.id===qid))?.teile.find(t=>t.id===qid));
  const opts=q?.optionen||q?.optionen;
  if(!opts)return;
  state.answers[qid]=opts[idx];
  if(!isCombi)setTimeout(()=>nextScreen(),250);
  else render();
};

window.toggleMulti=function(qid,idx,max){
  const opts=FRAGEN[qid]?.optionen;if(!opts)return;
  const cur=state.answers[qid]||[];
  const opt=opts[idx];
  const already=cur.find(o=>o.label===opt.label);
  state.answers[qid]=already?cur.filter(o=>o.label!==opt.label):(cur.length<max?[...cur,opt]:cur);
  render();
};

window.selKiNach=function(block,idx){
  const ki=state.kiNachfragen[block];if(!ki)return;
  const label=ki.optionen[idx];
  const muda=(ki.muda_mapping&&ki.muda_mapping[idx])||[];
  const score=(ki.scoring&&ki.scoring[idx])||50;
  state.kiNachfrageAnswers[block]={label,muda,score};
  render();
};

window.nextScreen=function(){
  if(state.idx<SCREENS.length-1){state.idx++;render();}
};

window.prevScreen=function(){
  if(state.idx<=0)return;
  state.idx--;
  const s=SCREENS[state.idx];
  if(s.type==='loading'||s.type==='ki_insight'||s.type==='ki_nachfrage'){state.idx--;}
  render();
};

// ─── API CALLS ───────────────────────────────────────────────────────────────

async function triggerLoading(s){
  let mi=0;
  const el=()=>document.getElementById('loading-msg');
  const t=setInterval(()=>{mi=(mi+1)%LOADING_MSGS.length;if(el())el().textContent=LOADING_MSGS[mi];},1800);
  try{
    if(s.api==='nachfrage')await callKiNachfrage(s.block);
    else if(s.api==='insight')await callKiInsight(s.block);
    else if(s.api==='analyse')await callKiAnalyse();
  }catch(e){console.error('API:',e);}
  clearInterval(t);
  nextScreen();
}

async function callKiNachfrage(block){
  const e=getEinstieg();
  const r=await fetch('/api/ki-nachfrage',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branche:e.branche,mitarbeiter:e.mitarbeiter,schwerpunkte:e.schwerpunkte,
      ausstattung:state.answers.E4||[],blockNr:block,blockAntworten:getBlockAntworten(block)})});
  state.kiNachfragen[block]=await r.json();
}

async function callKiInsight(block){
  const e=getEinstieg();
  const sc=berechneAlleScores(state.answers,e);state.scores=sc;
  const r=await fetch('/api/ki-insight',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branche:e.branche,mitarbeiter:e.mitarbeiter,blockNr:block,
      blockTitel:BLOCK_INFO[block].titel,blockAntworten:getBlockAntworten(block),
      kiNachfrageAntwort:state.kiNachfrageAnswers[block],blockScore:sc.blockScores[block],
      zeitverlust:sc.zeitverluste[block]})});
  state.kiInsights[block]=await r.json();
}

async function callKiAnalyse(){
  const e=getEinstieg();
  const sc=berechneAlleScores(state.answers,e);state.scores=sc;
  const r=await fetch('/api/ki-analyse',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({branche:e.branche,mitarbeiter:e.mitarbeiter,schwerpunkte:e.schwerpunkte,
      ausstattung:state.answers.E4||[],alleAntworten:state.answers,scores:sc,
      kiInsights:state.kiInsights,zeitverlustGesamt:sc.zeitverlustGesamt,kostenJahr:sc.kostenJahr})});
  state.kiAnalyse=await r.json();
}

// ─── TYPEWRITER ───────────────────────────────────────────────────────────────

function triggerTypewriter(block){
  const ki=state.kiInsights[block];if(!ki)return;
  const el=document.getElementById(`ki-text-${block}`);if(!el)return;
  const text=ki.insight_text||'';let i=0;el.textContent='';
  const iv=setInterval(()=>{
    el.textContent+=text[i]||'';i++;
    if(i>=text.length)clearInterval(iv);
  },26);
}

// ─── EMAIL SUBMIT ─────────────────────────────────────────────────────────────

window.submitEmail=async function(){
  const email=document.getElementById('email-input')?.value?.trim();
  if(!email||!email.includes('@'))return;
  const btn=document.querySelector('.email-gate .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Wird gespeichert…';}
  try{
    const e=getEinstieg();
    const sc=state.scores||berechneAlleScores(state.answers,e);
    const sr=await fetch('/api/lead/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({branche:e.branche,unternehmensgroesse:e.mitarbeiter,antworten:state.answers,
        scores:sc.blockScores,zeitverlust_woche:sc.zeitverlustGesamt,kosten_jahr:sc.kostenJahr,
        muda_profil:sc.mudaProfil,reifegrade:sc.reifegrade,ki_insights:state.kiInsights,ki_analyse:state.kiAnalyse})});
    const {token}=await sr.json();
    await fetch('/api/lead/save-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,email})});
    window.location.href=`/prozess-check/ergebnis/${token}`;
  }catch(err){
    console.error(err);
    if(btn){btn.disabled=false;btn.textContent='Meinen Plan erhalten →';}
  }
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
