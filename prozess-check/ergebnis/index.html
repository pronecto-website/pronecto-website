<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ihr Prozess-Check Ergebnis — PRONECTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #E8793A;
  --accent-soft: rgba(232,121,58,0.08);
  --navy: #1A1F2E;
  --bg: #FAFAFA;
  --white: #FFFFFF;
  --text: #1A1F2E;
  --text-secondary: #6B6B6B;
  --text-muted: #8A8A8A;
  --border: #E2E2E2;
  --green: #2E9E6B;
  --green-soft: rgba(46,158,107,0.08);
  --yellow: #E2A843;
  --yellow-soft: rgba(226,168,67,0.1);
  --red: #D94F4F;
  --red-soft: rgba(217,79,79,0.08);
  --blue: #3B7DD8;
  --blue-soft: rgba(59,125,216,0.08);
  --font: 'Outfit', -apple-system, sans-serif;
  --serif: 'Source Serif 4', Georgia, serif;
}

html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--font); color: var(--text); background: var(--bg); }

nav {
  position: sticky; top: 0; z-index: 100;
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(250,250,250,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid rgba(0,0,0,0.08);
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo svg { width: 26px; height: 26px; }
.nav-wordmark { font-size: 1rem; font-weight: 600; color: var(--navy); letter-spacing: 1.5px; text-transform: uppercase; }
.nav-tag { font-size: 0.78rem; color: var(--text-muted); }

.container { max-width: 760px; margin: 0 auto; padding: 0 24px; }
.section { padding: 48px 0; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }

/* HERO */
.hero { padding: 56px 0 48px; text-align: center; border-bottom: 1px solid var(--border); }
.hero-badge {
  display: inline-block; background: var(--green-soft); color: var(--green);
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px;
  padding: 6px 14px; border-radius: 980px; margin-bottom: 24px;
}
.hero h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 700; color: var(--navy); margin-bottom: 12px; letter-spacing: -0.3px; }
.hero h1 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent); }
.hero-subtitle { font-size: 1rem; color: var(--text-secondary); margin-bottom: 40px; }

.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 8px; }
.kpi-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 24px 20px; text-align: center;
}
.kpi-card.highlight { border-color: var(--accent); background: var(--accent-soft); }
.kpi-value { font-size: 2.2rem; font-weight: 700; color: var(--navy); line-height: 1; margin-bottom: 6px; }
.kpi-card.highlight .kpi-value { color: var(--accent); }
.kpi-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }

/* SECTION HEADERS */
.section-header { margin-bottom: 28px; }
.section-eyebrow { font-size: 0.75rem; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.section-title { font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.section-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }

/* KI ANALYSE */
.analyse-text { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.8; }
.analyse-text p { margin-bottom: 16px; }
.analyse-text p:last-child { margin-bottom: 0; }
.analyse-text strong { color: var(--navy); font-weight: 600; }

/* MUDA CHART */
.muda-list { display: flex; flex-direction: column; gap: 12px; }
.muda-row { display: flex; align-items: center; gap: 14px; }
.muda-icon { font-size: 1.1rem; width: 28px; text-align: center; flex-shrink: 0; }
.muda-info { flex: 1; min-width: 0; }
.muda-name { font-size: 0.85rem; font-weight: 500; color: var(--navy); margin-bottom: 5px; }
.muda-bar-wrap { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
.muda-bar { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.25,0.46,0.45,0.94); }
.muda-bar.high { background: var(--red); }
.muda-bar.mid { background: var(--yellow); }
.muda-bar.low { background: var(--green); }
.muda-score { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); width: 32px; text-align: right; flex-shrink: 0; }

.muda-legend { display: flex; gap: 20px; margin-top: 16px; font-size: 0.75rem; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

/* AUTOMATISIERUNGSPLAN */
.prozess-cards { display: flex; flex-direction: column; gap: 20px; }
.prozess-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.prozess-card-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.prozess-rank { font-size: 0.72rem; font-weight: 700; color: var(--accent); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.prozess-name { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.prozess-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 980px;
  background: var(--accent-soft); color: var(--accent);
}
.tag.muda { background: var(--yellow-soft); color: #a06a00; }
.tag.reifegrad { background: var(--blue-soft); color: var(--blue); }
.prozess-body { padding: 16px 20px; }
.ist-soll { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.ist-block, .soll-block { border-radius: 8px; padding: 12px 14px; }
.ist-block { background: var(--red-soft); }
.soll-block { background: var(--green-soft); }
.ist-soll-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
.ist-block .ist-soll-label { color: var(--red); }
.soll-block .ist-soll-label { color: var(--green); }
.ist-soll-text { font-size: 0.85rem; color: var(--navy); line-height: 1.5; }
.ersparnis-row { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
.ersparnis-label { font-size: 0.82rem; color: var(--text-muted); }
.ersparnis-value { font-size: 0.95rem; font-weight: 700; color: var(--green); }

/* REIFEGRAD */
.reifegrad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.reifegrad-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 16px;
}
.reifegrad-bereich { font-size: 0.82rem; font-weight: 500; color: var(--navy); margin-bottom: 10px; }
.reifegrad-stufen { display: flex; gap: 4px; margin-bottom: 8px; }
.reifegrad-dot {
  flex: 1; height: 6px; border-radius: 3px; background: var(--border);
  transition: background 0.5s;
}
.reifegrad-dot.filled { background: var(--accent); }
.reifegrad-name { font-size: 0.75rem; color: var(--text-muted); }

/* METHODIK */
.methodik-box {
  background: var(--navy); border-radius: 14px; padding: 28px 32px;
  display: flex; gap: 32px; align-items: flex-start;
}
.methodik-box p { font-size: 0.85rem; color: rgba(255,255,255,0.65); line-height: 1.7; }
.methodik-box strong { color: white; }
.methodik-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.methodik-badge {
  font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 980px;
  border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
}

/* EMAIL */
.email-box {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 32px; text-align: center;
}
.email-box h3 { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.email-box p { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 24px; }
.email-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto 12px; }
.email-input {
  flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
  font-family: var(--font); font-size: 0.9rem; background: var(--bg);
  transition: border-color 0.2s; outline: none;
}
.email-input:focus { border-color: var(--accent); }
.email-btn {
  background: var(--accent); color: white; border: none; border-radius: 10px;
  padding: 12px 20px; font-family: var(--font); font-size: 0.88rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
}
.email-btn:hover { opacity: 0.85; }
.email-disclaimer { font-size: 0.75rem; color: var(--text-muted); }
.email-success { color: var(--green); font-weight: 500; font-size: 0.9rem; margin-top: 8px; display: none; }

/* CTA */
.cta-section { padding: 56px 0; text-align: center; }
.cta-section h2 { font-size: 1.6rem; font-weight: 700; color: var(--navy); margin-bottom: 12px; letter-spacing: -0.3px; }
.cta-section h2 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent); }
.cta-section p { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; line-height: 1.7; }
.btn-cta {
  display: inline-block; background: var(--accent); color: white;
  padding: 16px 40px; border-radius: 980px; text-decoration: none;
  font-size: 1rem; font-weight: 600; transition: opacity 0.2s;
  margin-bottom: 16px;
}
.btn-cta:hover { opacity: 0.85; }
.cta-note { font-size: 0.8rem; color: var(--text-muted); }

/* LOADING / ERROR */
.state-loading, .state-error {
  min-height: calc(100vh - 56px); display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .ist-soll { grid-template-columns: 1fr; }
  .reifegrad-grid { grid-template-columns: 1fr; }
  .methodik-box { flex-direction: column; gap: 16px; }
  .email-form { flex-direction: column; }
  nav { padding: 0 16px; }
  .container { padding: 0 16px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M8 40 Q20 14 32 14 Q44 14 56 40" stroke="#E8793A" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M20 40 L20 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <path d="M32 40 L32 14" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <path d="M44 40 L44 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <circle cx="8" cy="40" r="3" fill="#E8793A" opacity="0.4"/>
      <circle cx="56" cy="40" r="3" fill="#E8793A"/>
    </svg>
    <span class="nav-wordmark">PRONECTO</span>
  </a>
  <span class="nav-tag">Prozess-Check · Ergebnis</span>
</nav>

<div id="app">
  <div class="state-loading">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);font-size:0.9rem;">Ergebnis wird geladen…</p>
  </div>
</div>

<script>
const token = window.location.pathname.split('/').filter(Boolean).pop();

async function loadResult() {
  try {
    const res = await fetch('/api/lead/' + token);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    renderResult(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="state-error">
        <div style="font-size:2.5rem;margin-bottom:20px;">🔍</div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:8px;">Ergebnis nicht gefunden</div>
        <div style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:28px;">Der Link ist möglicherweise abgelaufen oder ungültig.</div>
        <a href="/prozess-check" style="background:var(--accent);color:#fff;padding:12px 28px;border-radius:980px;text-decoration:none;font-size:0.9rem;font-weight:600;">
          Neuen Check starten
        </a>
      </div>
    `;
  }
}

function renderResult(d) {
  const score = d.gesamtscore || 0;
  const ersparniswoche = d.ersparnis_woche || 0;
  const ersparnisjahr = d.ersparnis_jahr || 0;

  const mudaIcons = {
    warten: '⏳', ueberbearbeitung: '🔄', bewegung: '🔀',
    transport: '📋', bestaende: '📥', fehler: '⚠️', ueberproduktion: '📊'
  };
  const mudaLabels = {
    warten: 'Warten', ueberbearbeitung: 'Überbearbeitung', bewegung: 'Systemwechsel',
    transport: 'Datenübertragung', bestaende: 'Liegengebliebenes', fehler: 'Fehleranfälligkeit', ueberproduktion: 'Überproduktion'
  };

  const mudaProfil = d.muda_profil || {};
  const prozesse = d.prozesse || [];

  const reifegradNamen = ['', 'Ad-hoc', 'Managed', 'Definiert', 'Gemessen', 'Optimiert'];

  function reifegradDots(stufe) {
    return Array.from({length: 5}, (_, i) =>
      `<div class="reifegrad-dot ${i < stufe ? 'filled' : ''}"></div>`
    ).join('');
  }

  const branchenLabel = {
    handwerk: 'Handwerk', elektro: 'Elektrotechnik',
    autohaus: 'Autohaus', sonstiges: 'Allgemein'
  }[d.branche] || d.branche;

  document.getElementById('app').innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="container">
        <div class="hero-badge">✓ Analyse abgeschlossen · ${branchenLabel} · ${d.unternehmensgroesse} Mitarbeiter</div>
        <h1>Ihr Prozess-Check <em>Ergebnis</em></h1>
        <div class="hero-subtitle">Basierend auf Ihren Antworten hat unsere KI folgende Potenziale identifiziert:</div>
        <div class="kpi-grid">
          <div class="kpi-card highlight">
            <div class="kpi-value">${score}/100</div>
            <div class="kpi-label">Automatisierungspotenzial</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${Math.round(ersparniswoche)}h</div>
            <div class="kpi-label">Einsparung pro Woche</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${Math.round(ersparnisjahr)}h</div>
            <div class="kpi-label">Einsparung pro Jahr</div>
          </div>
        </div>
      </div>
    </div>

    <!-- KI ANALYSE -->
    <div class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-eyebrow">KI-Einschätzung</div>
          <div class="section-title">Was unsere Analyse ergeben hat</div>
        </div>
        <div class="analyse-text" id="analyseText">
          ${(d.ki_analyse || '').split('\n\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')}
        </div>
      </div>
    </div>

    <!-- VERSCHWENDUNGSANALYSE -->
    <div class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-eyebrow">Lean-Methodik</div>
          <div class="section-title">Verschwendungsanalyse (7 Muda)</div>
          <div class="section-desc">Jeder identifizierte Engpass wird einer der 7 Lean-Verschwendungsarten zugeordnet. Hohe Werte zeigen, wo der größte Handlungsbedarf besteht.</div>
        </div>
        <div class="muda-list">
          ${Object.entries(mudaProfil)
            .sort(([,a],[,b]) => b - a)
            .map(([key, val]) => {
              const pct = Math.round(val * 100);
              const cls = pct >= 60 ? 'high' : pct >= 35 ? 'mid' : 'low';
              return `
                <div class="muda-row">
                  <div class="muda-icon">${mudaIcons[key] || '•'}</div>
                  <div class="muda-info">
                    <div class="muda-name">${mudaLabels[key] || key}</div>
                    <div class="muda-bar-wrap">
                      <div class="muda-bar ${cls}" style="width:${pct}%"></div>
                    </div>
                  </div>
                  <div class="muda-score">${pct}%</div>
                </div>
              `;
            }).join('')}
        </div>
        <div class="muda-legend">
          <span><span class="legend-dot" style="background:var(--red)"></span>Hoher Handlungsbedarf</span>
          <span><span class="legend-dot" style="background:var(--yellow)"></span>Mittlerer Bedarf</span>
          <span><span class="legend-dot" style="background:var(--green)"></span>Gering</span>
        </div>
      </div>
    </div>

    <!-- AUTOMATISIERUNGSPLAN -->
    <div class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-eyebrow">Ihr Aktionsplan</div>
          <div class="section-title">Top-3 Automatisierungsempfehlungen</div>
          <div class="section-desc">Diese drei Prozesse bieten das größte Verhältnis von Aufwand zu Zeitersparnis — priorisiert nach Ihren konkreten Antworten.</div>
        </div>
        <div class="prozess-cards">
          ${prozesse.slice(0, 3).map((p, i) => `
            <div class="prozess-card">
              <div class="prozess-card-header">
                <div class="prozess-rank">Priorität ${i + 1}</div>
                <div class="prozess-name">${p.name}</div>
                <div class="prozess-tags">
                  ${(p.muda_tags || []).map(t => `<span class="tag muda">${t}</span>`).join('')}
                  <span class="tag reifegrad">${reifegradNamen[p.reifegrad] || 'Reifegrad ' + p.reifegrad}</span>
                </div>
              </div>
              <div class="prozess-body">
                <div class="ist-soll">
                  <div class="ist-block">
                    <div class="ist-soll-label">Ist-Zustand</div>
                    <div class="ist-soll-text">${p.ist}</div>
                  </div>
                  <div class="soll-block">
                    <div class="ist-soll-label">Soll-Zustand</div>
                    <div class="ist-soll-text">${p.soll}</div>
                  </div>
                </div>
                <div class="ersparnis-row">
                  <span class="ersparnis-label">Geschätzte Zeitersparnis</span>
                  <span class="ersparnis-value">${p.ersparnis}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- PROZESSREIFEGRAD -->
    <div class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-eyebrow">CMMI-Methodik</div>
          <div class="section-title">Prozessreifegrad nach Bereich</div>
          <div class="section-desc">Bewertet von 1 (Ad-hoc) bis 5 (Optimiert). Zeigt wo Ihre Prozesse heute stehen und wo Verbesserungspotenzial liegt.</div>
        </div>
        <div class="reifegrad-grid" id="reifegradGrid">
          ${prozesse.map(p => `
            <div class="reifegrad-card">
              <div class="reifegrad-bereich">${p.name}</div>
              <div class="reifegrad-stufen">${reifegradDots(p.reifegrad)}</div>
              <div class="reifegrad-name">${reifegradNamen[p.reifegrad] || ''}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- METHODIK -->
    <div class="section">
      <div class="container">
        <div class="methodik-box">
          <div>
            <div style="font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Methodik</div>
            <p>Diese Analyse folgt dem <strong>DMAIC-Zyklus</strong> (Define, Measure, Analyze, Improve, Control) aus dem Six Sigma-Framework. Die Verschwendungsanalyse basiert auf den <strong>7 Muda</strong> der Lean-Methodik. Der Prozessreifegrad orientiert sich am <strong>CMMI-Modell</strong>.</p>
            <div class="methodik-badges">
              <span class="methodik-badge">Six Sigma DMAIC</span>
              <span class="methodik-badge">7 Muda (Lean)</span>
              <span class="methodik-badge">CMMI Reifegrade</span>
              <span class="methodik-badge">KI-Analyse</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- EMAIL -->
    <div class="section">
      <div class="container">
        <div class="email-box">
          <h3>Dieses Ergebnis per E-Mail erhalten</h3>
          <p>Wir schicken Ihnen den Link zu Ihrem Ergebnis und eine PDF-Zusammenfassung. Kein Newsletter. Nur Ihr Ergebnis.</p>
          <div class="email-form">
            <input type="email" class="email-input" id="emailInput" placeholder="ihre@email.de">
            <button class="email-btn" onclick="saveEmail()">Zusenden</button>
          </div>
          <div class="email-disclaimer">Ihre E-Mail wird nicht für Werbezwecke genutzt.</div>
          <div class="email-success" id="emailSuccess">✓ Ergebnis wurde zugeschickt!</div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-section">
      <div class="container">
        <h2>Diesen Plan <em>umsetzen</em></h2>

async function saveEmail() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailInput').style.borderColor = 'var(--red)';
    return;
  }
  document.getElementById('emailInput').style.borderColor = 'var(--border)';

  try {
    await fetch('/api/lead/save-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, email })
    });
    document.getElementById('emailSuccess').style.display = 'block';
    document.querySelector('.email-form').style.display = 'none';
  } catch (e) {
    alert('Fehler beim Speichern. Bitte versuchen Sie es erneut.');
  }
}

loadResult();
