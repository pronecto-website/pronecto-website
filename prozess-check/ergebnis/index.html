<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ihr Prozess-Check Ergebnis — PRONECTO</title>
<link rel="stylesheet" href="/css/shared.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { background: var(--bg); }

header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.share-btn { font-size: 0.82rem; color: var(--text-sec); background: none; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 12px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all 0.2s; }
.share-btn:hover { border-color: var(--orange); color: var(--orange); }

main { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* ── Loading / Error ── */
#loading-state, #error-state { text-align: center; padding: 80px 20px; }
#error-state { color: var(--red); }

/* ── Stat Cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 48px; }
@media(max-width:650px){ .stats-grid{ grid-template-columns:1fr 1fr; } }
@media(max-width:400px){ .stats-grid{ grid-template-columns:1fr; } }

/* ── Section ── */
.section { margin-bottom: 48px; }
.section-title { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.section-sub { font-size: 0.8rem; color: var(--text-sec); margin-bottom: 20px; }

/* ── Handlungsbedarf Bars ── */
.hb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.hb-label { font-size: 0.85rem; color: var(--navy); width: 230px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.hb-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.hb-fill { height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
.hb-score { font-size: 0.8rem; font-weight: 700; width: 32px; text-align: right; }
@media(max-width:520px){ .hb-label{ width:140px;font-size:0.75rem; } }

/* ── Muda Radar ── */
.chart-wrap { max-width: 420px; margin: 0 auto; }

/* ── DZE Bars ── */
.dze-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dze-label { font-size: 0.82rem; color: var(--navy); width: 200px; flex-shrink: 0; }
.dze-track { flex: 1; height: 22px; background: var(--border); border-radius: var(--r-sm); overflow: hidden; display: flex; }
.dze-produktiv { background: var(--green); height: 100%; transition: width 1s ease; }
.dze-verschwendung { background: #FFD6D6; flex: 1; height: 100%; }
.dze-pct { font-size: 0.78rem; font-weight: 600; color: var(--green); width: 36px; text-align: right; }
.dze-legend { display: flex; gap: 16px; margin-bottom: 14px; }
.dze-legend span { font-size: 0.75rem; color: var(--text-sec); display: flex; align-items: center; gap: 5px; }
.dze-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
@media(max-width:520px){ .dze-label{ width:130px;font-size:0.75rem; } }

/* ── Reifegrad ── */
.rg-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.rg-col { text-align: center; }
.rg-col-title { font-size: 0.7rem; color: var(--text-sec); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rg-bars { display: flex; flex-direction: column-reverse; gap: 3px; }
.rg-step {
  height: 24px; border-radius: 4px;
  transition: all 0.6s ease;
}
.rg-step.active-ist { opacity: 1; }
.rg-step.active-ziel { opacity: 0; border: 2px dashed; background: transparent !important; opacity: 1; }
.rg-step.inactive { opacity: 0.12; }
.rg-val { font-size: 0.8rem; font-weight: 700; margin-top: 6px; }
.rg-levels { display: flex; flex-direction: column-reverse; gap: 3px; margin-right: 8px; }
.rg-level-label { height: 24px; font-size: 0.65rem; color: var(--text-sec); display: flex; align-items: center; }
.rg-wrap { display: flex; align-items: flex-start; }
.rg-ziel-label { font-size: 0.68rem; color: var(--text-sec); margin-top: 4px; }
@media(max-width:520px){ .rg-grid{ grid-template-columns:repeat(5,1fr); gap:5px; } .rg-step{height:18px;} }

/* ── Maßnahmenplan ── */
.massnahme-card { border:1px solid var(--border); border-radius:var(--r-card); border-left-width:4px; padding:20px; background:var(--white); margin-bottom:14px; }
.massnahme-card.quick_win { border-left-color:var(--green); }
.massnahme-card.mittelfristig { border-left-color:var(--yellow); }
.massnahme-card.strategisch { border-left-color:var(--blue); }
.massnahme-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
.massnahme-bereich { font-weight:700; font-size:0.95rem; }
.massnahme-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.massnahme-ist { background:#FFF0F0; color:#8B3333; font-size:0.82rem; padding:10px; border-radius:var(--r-sm); line-height:1.4; }
.massnahme-soll { background:#F0FFF8; color:#1E6B47; font-size:0.82rem; padding:10px; border-radius:var(--r-sm); line-height:1.4; }
.massnahme-ist::before { content:'Ist: '; font-weight:700; display:block; margin-bottom:3px; }
.massnahme-soll::before { content:'Soll: '; font-weight:700; display:block; margin-bottom:3px; }
.massnahme-desc { font-size:0.83rem; color:var(--text); line-height:1.6; }
.massnahme-footer { display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
.ersparnis-tag { font-size:0.78rem; font-weight:600; color:var(--green); background:#F0FFF8; padding:4px 10px; border-radius:20px; }
@media(max-width:500px){ .massnahme-grid{grid-template-columns:1fr;} }

/* ── Gesamteinschätzung ── */
.ki-text-block { font-size:0.93rem; color:var(--text); line-height:1.8; background:var(--white); border:1px solid var(--border); border-radius:var(--r-card); padding:24px; }

/* ── Methodik ── */
.methodik-box { background:var(--white); border:1px solid var(--border); border-radius:var(--r-card); padding:20px; }
.methodik-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.methodik-tag { font-size:0.75rem; background:#F5F5F5; color:var(--text); padding:5px 12px; border-radius:20px; }

/* ── CTA ── */
.cta-box { background:linear-gradient(135deg,var(--navy) 0%,#2A3550 100%); border-radius:var(--r-card); padding:36px; text-align:center; color:white; }
.cta-box h2 { color:white; margin-bottom:12px; }
.cta-box p { color:rgba(255,255,255,0.7); font-size:0.92rem; margin-bottom:24px; }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <svg viewBox="0 0 64 64" fill="none" width="26" height="26">
      <path d="M8 40 Q20 14 32 14 Q44 14 56 40" stroke="#E8793A" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M20 40 L20 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <path d="M32 40 L32 14" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <path d="M44 40 L44 24.5" stroke="#E8793A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <circle cx="8" cy="40" r="3" fill="#E8793A" opacity="0.4"/>
      <circle cx="56" cy="40" r="3" fill="#E8793A"/>
    </svg>
    <span class="logo-text">PRONECTO</span>
  </a>
  <div class="header-right">
    <button class="share-btn" onclick="shareLink()">🔗 Ergebnis teilen</button>
    <span style="font-size:0.78rem;color:var(--text-sec)">Prozess-Check · Ergebnis</span>
  </div>
</header>

<main>
  <div id="loading-state">
    <div class="spinner" style="margin:0 auto 20px"></div>
    <p>Ihre Analyse wird geladen…</p>
  </div>
  <div id="error-state" style="display:none">
    <p>Ergebnis nicht gefunden. <a href="/prozess-check" style="color:var(--orange)">Neuen Prozess-Check starten →</a></p>
  </div>
  <div id="result-content" style="display:none"></div>
</main>

<script>
const BLOCK_INFO={1:{titel:'Kundenanfragen & Erstreaktion',icon:'📞'},2:{titel:'Angebote & Kalkulation',icon:'📋'},3:{titel:'Auftragsabwicklung',icon:'🔧'},4:{titel:'Rechnungen & Zahlungen',icon:'💶'},5:{titel:'Kundenbindung',icon:'⭐'}};
const AUFWAND_LABELS={quick_win:{label:'Quick Win',color:'var(--green)',bg:'#F0FFF8'},mittelfristig:{label:'Mittelfristig',color:'#B8872A',bg:'#FFFBF0'},strategisch:{label:'Strategisch',color:'var(--blue)',bg:'#F0F6FF'}};
const REIFEGRAD_LABELS={1:'Ad-hoc',2:'Wiederholbar',3:'Definiert',4:'Gesteuert',5:'Optimiert'};
const MUDA_LABELS={M1:'Transport',M2:'Lange Wege',M3:'Inventar',M4:'Wartezeiten',M5:'Fehler',M6:'Mehraufwand',M7:'Überproduktion'};

function getToken(){
  const parts=window.location.pathname.split('/');
  return parts[parts.length-1];
}

async function loadData(){
  const token=getToken();
  if(!token){showError();return;}
  try{
    const r=await fetch(`/api/lead/${token}`);
    if(!r.ok){showError();return;}
    const data=await r.json();
    renderAll(data);
  }catch(e){showError();}
}

function showError(){
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
}

function renderAll(d){
  document.getElementById('loading-state').style.display='none';
  const el=document.getElementById('result-content');
  el.style.display='block';
  el.innerHTML=buildHTML(d);
  // Charts need DOM to exist first
  requestAnimationFrame(()=>{
    buildMudaRadar(d.muda_profil);
    animateBars();
  });
}

function buildHTML(d){
  const scores=d.scores||{};
  const hb=calcHandlungsbedarf(scores,d);
  const zt=d.zeitverlust_woche||0;
  const kj=d.kosten_jahr||0;
  const rg=d.reifegrade||{};
  const ki=d.ki_analyse||{};
  const muda=d.muda_profil||[];
  const dze=calcDZE(scores);

  return `
  <!-- Stat Cards -->
  <div class="stats-grid">
    <div class="stat-card stat-orange">
      <div class="stat-value">${zt.toFixed(1)}</div>
      <div class="stat-label">Stunden Zeitverlust / Woche</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${Math.round(kj).toLocaleString('de-DE')}</div>
      <div class="stat-label">Geschätzte Kosten / Jahr (€)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${calcAvgReifegrad(rg)}</div>
      <div class="stat-label">Ø Reifegrad (von 5)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">~${Math.round(zt*0.65).toFixed(1)}</div>
      <div class="stat-label">Einsparpotenzial h/Woche</div>
    </div>
  </div>

  ${ki.dringlichkeit ? `<div style="background:rgba(232, 121, 58, 0.1);border-left:4px solid var(--orange);padding:16px;margin:24px 0;border-radius:6px">
    <div style="font-weight:600;color:var(--orange);margin-bottom:8px">⚡ Dringlichkeit</div>
    <div style="font-size:0.95rem;color:var(--text);line-height:1.6">${ki.dringlichkeit.text||''}</div>
  </div>` : ''}

  <!-- Modell 1: Handlungsbedarf -->
  <div class="section">
    <div class="section-title">Wo liegt der größte Handlungsbedarf?</div>
    <div class="section-sub">Alle 5 Bereiche Ihres Betriebs — priorisiert nach Dringlichkeit und Verbesserungspotenzial</div>
    ${Object.entries(hb).sort(([,a],[,b])=>b-a).map(([b,v])=>{
      const c=v>=70?'var(--red)':v>=40?'var(--yellow)':'var(--green)';
      return `<div class="hb-row">
        <div class="hb-label">${BLOCK_INFO[b].icon} ${BLOCK_INFO[b].titel}</div>
        <div class="hb-track"><div class="hb-fill" data-width="${v}" style="width:0%;background:${c}"></div></div>
        <div class="hb-score" style="color:${c}">${v}</div>
      </div>`;
    }).join('')}
  </div>

  <!-- Modell 2: Muda Radar -->
  <div class="section">
    <div class="section-title">Welche Zeitdiebe kosten Sie am meisten?</div>
    <div class="section-sub">7 typische Ursachen für Prozessverluste — je größer der Bereich, desto mehr Zeit verlieren Sie dort</div>
    <div class="chart-wrap"><canvas id="muda-radar" height="300"></canvas></div>
  </div>

  <!-- Modell 3: DZE -->
  <div class="section">
    <div class="section-title">Wie viel Ihrer Arbeitszeit ist wirklich produktiv?</div>
    <div class="section-sub">Anteil der wertschöpfenden Arbeit pro Bereich — der Rest ist Warten, Suchen und Nacharbeiten</div>
    <div class="dze-legend">
      <span><span class="dze-dot" style="background:var(--green)"></span>Produktive Arbeit</span>
      <span><span class="dze-dot" style="background:#FFD6D6"></span>Wartezeit & Verschwendung</span>
    </div>
    ${Object.entries(dze).map(([b,v])=>`
    <div class="dze-row">
      <div class="dze-label">${BLOCK_INFO[b].icon} ${BLOCK_INFO[b].titel}</div>
      <div class="dze-track">
        <div class="dze-produktiv" data-width="${Math.round(v*100)}" style="width:0%"></div>
        <div class="dze-verschwendung"></div>
      </div>
      <div class="dze-pct" data-val="${Math.round(v*100)}">0%</div>
    </div>`).join('')}
  </div>

  <!-- Modell 4: Reifegrad -->
  <div class="section">
    <div class="section-title">Wie digital ist Ihr Betrieb aufgestellt?</div>
    <div class="section-sub">Stand heute (gefüllt) und realistisches Ziel für die nächsten 12 Monate (gestrichelt)</div>
    ${buildReifegrad(rg)}
  </div>

  <!-- Modell 5: Maßnahmenplan -->
  <div class="section">
    <div class="section-title">Ihr persönlicher Maßnahmenplan</div>
    <div class="section-sub">Sortiert nach Aufwand — Quick Wins zuerst. Jede Maßnahme ist direkt umsetzbar.</div>
    ${buildMassnahmen(ki.massnahmen||[])}
  </div>

  <!-- Gesamteinschätzung -->
  <div class="section">
    <div class="section-title">KI-Gesamteinschätzung</div>
    <div class="section-sub">Basierend auf Ihren Antworten und den Branchenbenchmarks</div>
    <div class="ki-text-block">${ki.gesamteinschaetzung||''}</div>
  </div>

  <!-- CTA -->
  <div class="cta-box">
    <h2>${Object.entries(hb).sort(([,a],[,b])=>b-a)[0] ? `${BLOCK_INFO[Object.entries(hb).sort(([,a],[,b])=>b-a)[0][0]].titel} ist Ihr dringlichster Bereich.` : 'Bereit für den nächsten Schritt?'}</h2>
    <p>30 Minuten. Unverbindlich. Kein Verkaufsgespräch. Nur Klarheit darüber, was für Ihren Betrieb Sinn macht.</p>
    <a href="mailto:hallo@pronecto.de?subject=Prozess-Check Erstgespräch" class="btn btn-primary btn-lg">Kostenloses Erstgespräch →</a>
    <p style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:12px">Oder schreiben Sie direkt: hallo@pronecto.de</p>
  </div>`;
}

function calcHandlungsbedarf(scores, d){
  const result={};
  for(let b=1;b<=5;b++){
    const s=scores[b]||50;
    const strat=40; // simplified without schwerpunkte data on results page
    const verbW=100-s;
    const verbF=50; // simplified
    result[b]=Math.round(strat*0.3+verbW*0.5+verbF*0.2);
  }
  return result;
}

function calcDZE(scores){
  const result={};
  for(let b=1;b<=5;b++){
    const s=scores[b]||50;
    result[b]=s>=70?0.60:s>=40?0.35:0.18;
  }
  return result;
}

function calcAvgReifegrad(rg){
  const vals=Object.values(rg).filter(Number);
  if(!vals.length)return '—';
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

function buildReifegrad(rg){
  const cols=Object.keys(BLOCK_INFO).map(b=>{
    const ist=rg[b]||1;
    const ziel=Math.min(5,ist+1);
    const bars=[1,2,3,4,5].map(lvl=>{
      if(lvl===ziel&&lvl>ist){
        return `<div class="rg-step active-ziel" style="border-color:var(--orange)"></div>`;
      }
      const cls=lvl<=ist?'active-ist':'inactive';
      const col=ist>=4?'var(--green)':ist>=3?'var(--yellow)':'var(--red)';
      return `<div class="rg-step ${cls}" style="background:${lvl<=ist?col:'var(--border)'}"></div>`;
    }).reverse().join('');
    return `<div class="rg-col">
      <div class="rg-col-title">${BLOCK_INFO[b].icon} ${BLOCK_INFO[b].titel}</div>
      <div class="rg-bars">${bars}</div>
      <div class="rg-val">${ist}<span style="font-size:0.65rem;color:var(--text-sec)">/5</span></div>
      <div class="rg-ziel-label">Ziel: ${ziel}</div>
    </div>`;
  }).join('');
  const levelLabels=[5,4,3,2,1].map(l=>`<div class="rg-level-label" style="height:27px">${REIFEGRAD_LABELS[l]}</div>`).join('');
  return `<div class="rg-wrap">
    <div class="rg-levels">${levelLabels}</div>
    <div class="rg-grid" style="flex:1">${cols}</div>
  </div>`;
}

function buildMassnahmen(list){
  if(!list.length)return '<p style="color:var(--text-sec);font-size:0.9rem">Keine Maßnahmen generiert.</p>';
  return list.slice(0,3).map(m=>{
    const aw=AUFWAND_LABELS[m.aufwand]||AUFWAND_LABELS.mittelfristig;
    return `<div class="massnahme-card ${m.aufwand||'mittelfristig'}">
      <div class="massnahme-header">
        <div class="massnahme-bereich">${m.bereich}</div>
        <span class="badge" style="background:${aw.bg};color:${aw.color}">${aw.label}</span>
      </div>
      <div class="massnahme-grid">
        <div class="massnahme-ist">${m.ist}</div>
        <div class="massnahme-soll">${m.soll}</div>
      </div>
      ${m.beschreibung?`<div class="massnahme-desc">${m.beschreibung}</div>`:''}
      <div class="massnahme-footer">
        ${m.ersparnis_h_woche?`<span class="ersparnis-tag">~${m.ersparnis_h_woche}h/Woche Ersparnis</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function buildMudaRadar(mudaProfil){
  const labels=Object.values(MUDA_LABELS);
  const keys=Object.keys(MUDA_LABELS);

  // Convert muda profil to chart data
  const profileMap={};
  if(Array.isArray(mudaProfil)){
    mudaProfil.forEach(m=>{ profileMap[m.typ]=m.gewicht||0; });
  }
  const data=keys.map(k=>profileMap[k]||0);
  const maxVal=Math.max(...data,30);

  const ctx=document.getElementById('muda-radar');
  if(!ctx)return;
  new Chart(ctx,{
    type:'radar',
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor:'rgba(232,121,58,0.15)',
        borderColor:'#E8793A',
        borderWidth:2,
        pointBackgroundColor:'#E8793A',
        pointRadius:4,
      }],
    },
    options:{
      responsive:true,
      scales:{r:{min:0,max:maxVal,ticks:{display:false},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:11,family:'Outfit'},color:'#1A1F2E'}}},
      plugins:{legend:{display:false}},
    },
  });
}

function animateBars(){
  // Handlungsbedarf bars
  document.querySelectorAll('.hb-fill[data-width]').forEach(el=>{
    setTimeout(()=>{ el.style.width=el.dataset.width+'%'; },100);
  });
  // DZE bars
  document.querySelectorAll('.dze-produktiv[data-width]').forEach(el=>{
    setTimeout(()=>{
      el.style.width=el.dataset.width+'%';
      const pct=el.dataset.val;
      const pctEl=el.closest('.dze-row')?.querySelector('.dze-pct');
      if(pctEl)pctEl.textContent=pct+'%';
    },300);
  });
}

function shareLink(){
  const url=window.location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>alert('Link kopiert!'));
  }else{
    prompt('Link kopieren:',url);
  }
}

loadData();
</script>
</body>
</html>
